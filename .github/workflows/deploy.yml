name: Deploy Sapphire Agent to Interserver NBC

# On push to main: SSH to Interserver, pull latest code, rebuild Docker containers.
on:
  push:
    branches:
      - main

jobs:
  deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH agent and add private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_KASHIF_PK }}

      - name: Deploy to Interserver via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.INTERSERVER_NBC_USER }}@${{ secrets.INTERSERVER_NBC_HOST }} '
            set -e
            cd /home/adaxiomprojects/sapphire-agent-live &&
            git fetch origin &&
            git checkout main &&
            git reset --hard origin/main &&
            docker-compose -f docker-compose.yml down &&
            docker-compose -f docker-compose.yml up -d --build
          '
