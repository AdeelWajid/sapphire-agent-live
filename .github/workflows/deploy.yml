name: Deploy Plano Agent to Interserver NBC

# On push to main: SSH to Interserver, pull latest code, ensure .env exists, rebuild containers.
on:
  push:
    branches:
      - main

jobs:
  deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH agent and add private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_KASHIF_PK }}

      - name: Deploy to Interserver via SSH
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Shell-escape the key so it can be safely embedded in the remote script
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            REMOTE_KEY=$(printf '%q' "$GEMINI_API_KEY")
          else
            REMOTE_KEY=""
          fi

          ssh -o StrictHostKeyChecking=no \
            "${{ secrets.INTERSERVER_NBC_USER }}@${{ secrets.INTERSERVER_NBC_HOST }}" \
            bash -s <<EOF
          set -euo pipefail
          cd /home/adaxiomprojects/sapphire-agent-live
          git fetch origin
          git checkout main
          git reset --hard origin/main

          # .env is gitignored — create on the server, never commit it
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from .env.example"
          fi

          KEY=${REMOTE_KEY}
          if [ -n "\$KEY" ]; then
            if grep -q '^GEMINI_API_KEY=' .env; then
              sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=\$KEY|" .env
            else
              printf 'GEMINI_API_KEY=%s\n' "\$KEY" >> .env
            fi
            echo "Synced GEMINI_API_KEY into server .env"
          elif grep -Eq '^GEMINI_API_KEY=(your_gemini_api_key_here)?[[:space:]]*\$' .env; then
            echo "Missing GEMINI_API_KEY. Add GitHub secret GEMINI_API_KEY, or edit /home/adaxiomprojects/sapphire-agent-live/.env on the server."
            exit 1
          fi

          # Ensure call chat transcripts are enabled for Live logs
          if grep -q '^GEMINI_LIVE_TRANSCRIPTS=' .env; then
            sed -i 's|^GEMINI_LIVE_TRANSCRIPTS=.*|GEMINI_LIVE_TRANSCRIPTS=true|' .env
          else
            printf 'GEMINI_LIVE_TRANSCRIPTS=true\n' >> .env
          fi

          docker-compose -f docker-compose.yml down
          docker-compose -f docker-compose.yml up -d --build
          EOF
