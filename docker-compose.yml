version: '3.8'

services:
  sapphire_bot:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: sapphire_bot
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
